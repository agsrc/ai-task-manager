# --- Cloud-Ready Infrastructure ---
# Tell Quinoa where the React app lives (Absolute necessity)
quarkus.quinoa.ui-dir=src/main/webui
quarkus.quinoa.dev-server.port=5173

# Increase timeout for slow Cloud Cold Starts (Prevents the crash)
quarkus.quinoa.dev-server.check-timeout=120000

# --- Database Defaults ---
# Use a standard in-memory H2 for the cloud (no local file path needed)
quarkus.datasource.db-kind=h2
quarkus.hibernate-orm.database.generation=update

# --- AI Defaults ---
# Just the model ID; the base-url will default to localhost:11434 
# which matches the Ollama Dev Service Quarkus is pulling for you.
quarkus.langchain4j.ollama.chat-model.model-id=phi4-mini